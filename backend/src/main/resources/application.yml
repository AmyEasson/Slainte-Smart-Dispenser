spring:
  application:
    name: backend

  datasource:
    url: jdbc:h2:file:./data/vitamindb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

schedule:
  csv:
    location: classpath:mock/schedule.csv
