<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Sláinte — Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap');

        :root {
            --forest-deep: #0B1A0F;
            --forest-dark: #132A13;
            --forest-mid: #1E4D2B;
            --forest-green: #2D6A4F;
            --forest-pale: #52B788;
            --forest-mist: #B7E4C7;
            --cream: #F5F0E8;
            --cream-dark: #E8DFD0;
            --warm-white: #FEFCF8;
            --text-primary: #1A2E1A;
            --text-muted: #4A6B4A;
            --text-light: #7A9B7A;
            --danger: #C04030;
            --ok: #2D6A4F;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--cream);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
        }

        .forest-scene {
            position: relative;
            width: 100%;
            flex: 0 0 42%;
            overflow: hidden;
        }

        .forest-scene svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .firefly {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #E8C56D;
            box-shadow: 0 0 8px 3px rgba(232, 197, 109, 0.4);
            animation: float-firefly 6s ease-in-out infinite;
            opacity: 0;
        }

        .firefly:nth-child(1) { left: 15%; top: 30%; animation-delay: 0s; animation-duration: 7s; }
        .firefly:nth-child(2) { left: 70%; top: 20%; animation-delay: 2s; animation-duration: 5s; }
        .firefly:nth-child(3) { left: 45%; top: 45%; animation-delay: 4s; animation-duration: 8s; }
        .firefly:nth-child(4) { left: 80%; top: 35%; animation-delay: 1s; animation-duration: 6s; }
        .firefly:nth-child(5) { left: 25%; top: 50%; animation-delay: 3s; animation-duration: 9s; }
        .firefly:nth-child(6) { left: 55%; top: 15%; animation-delay: 5s; animation-duration: 7.5s; }

        @keyframes float-firefly {
            0%, 100% { opacity: 0; transform: translate(0, 0) scale(0.5); }
            15% { opacity: 0.9; }
            50% { opacity: 0.6; transform: translate(15px, -20px) scale(1); }
            85% { opacity: 0.8; }
        }

        .brand-overlay {
            position: absolute;
            bottom: 50px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
            animation: fade-up 1s ease-out 0.3s both;
        }

        .brand-name {
            font-family: 'Fraunces', serif;
            font-weight: 900;
            font-size: 48px;
            color: var(--warm-white);
            letter-spacing: -1px;
            text-shadow:
                    0 2px 20px rgba(11, 26, 15, 0.5),
                    0 0 60px rgba(45, 106, 79, 0.3);
            line-height: 1;
        }

        .brand-tagline {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-weight: 400;
            font-size: 14px;
            color: var(--forest-mist);
            margin-top: 6px;
            letter-spacing: 2px;
            text-transform: lowercase;
            text-shadow: 0 1px 10px rgba(11, 26, 15, 0.4);
        }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-area {
            flex: 1;
            background: var(--cream);
            padding: 24px 24px env(safe-area-inset-bottom, 20px);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 5;
            overflow: hidden;
            animation: slide-up 0.8s ease-out 0.5s both;
        }

        .form-area::before {
            content: '';
            position: absolute;
            top: -24px;
            left: 0;
            right: 0;
            height: 26px;
            background: var(--cream);
            border-radius: 26px 26px 0 0;
            z-index: 4;
        }

        @keyframes slide-up {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tab-bar {
            display: flex;
            background: var(--cream-dark);
            border-radius: 16px;
            padding: 4px;
            margin-bottom: 24px;
            position: relative;
        }

        .tab-slider {
            position: absolute;
            top: 4px;
            left: 4px;
            width: calc(50% - 4px);
            height: calc(100% - 8px);
            background: var(--forest-mid);
            border-radius: 13px;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(30, 77, 43, 0.3);
        }

        .tab-slider.register {
            transform: translateX(100%);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            position: relative;
            z-index: 2;
            transition: color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .tab-btn.active {
            color: var(--warm-white);
        }

        .field {
            margin-bottom: 16px;
            animation: fade-up 0.5s ease-out both;
        }

        .field:nth-child(1) { animation-delay: 0.6s; }
        .field:nth-child(2) { animation-delay: 0.7s; }

        .field-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .field-input {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid transparent;
            border-radius: 16px;
            background: var(--warm-white);
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            color: var(--text-primary);
            outline: none;
            transition: all 0.25s ease;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }

        .field-input::placeholder {
            color: var(--text-light);
        }

        .field-input:focus {
            border-color: var(--forest-pale);
            box-shadow:
                    0 0 0 4px rgba(82, 183, 136, 0.15),
                    0 2px 8px rgba(0,0,0,0.06);
        }

        .field-password {
            position: relative;
        }

        .field-password .field-input {
            padding-right: 50px;
        }

        .toggle-pw {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            -webkit-tap-highlight-color: transparent;
        }

        .toggle-pw:active {
            background: var(--cream-dark);
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--forest-mid), var(--forest-green));
            color: var(--warm-white);
            font-family: 'DM Sans', sans-serif;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(30, 77, 43, 0.35);
            -webkit-tap-highlight-color: transparent;
            animation: fade-up 0.5s ease-out 0.8s both;
        }

        .submit-btn:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: 0 2px 8px rgba(30, 77, 43, 0.3);
        }

        .submit-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            border-radius: inherit;
        }

        .msg {
            margin-top: 12px;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        .msg.err {
            display: block;
            background: #FEF2F2;
            color: var(--danger);
            border: 1px solid #FECACA;
            animation: shake 0.4s ease;
        }

        .msg.ok {
            display: block;
            background: #F0FDF4;
            color: var(--ok);
            border: 1px solid #BBF7D0;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .bottom-text {
            text-align: center;
            margin-top: auto;
            padding-top: 16px;
            font-size: 13px;
            color: var(--text-light);
            font-family: 'Fraunces', serif;
            font-style: italic;
            animation: fade-up 0.5s ease-out 1s both;
        }

        .submit-btn.loading {
            pointer-events: none;
            opacity: 0.85;
        }

        .submit-btn.loading .btn-text {
            opacity: 0;
        }

        .spinner {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 22px;
            height: 22px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .submit-btn.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>

<div class="form-area">
    <div class="tab-bar">
        <div class="tab-slider" id="tabSlider"></div>
        <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">Register</button>
    </div>

    <div class="field">
        <label class="field-label">Username</label>
        <input class="field-input" id="authUser" type="text" placeholder="Enter your username" autocomplete="username" />
    </div>

    <div class="field">
        <label class="field-label">Password</label>
        <div class="field-password">
            <input class="field-input" id="authPass" type="password" placeholder="Enter your password" autocomplete="current-password" />
            <button class="toggle-pw" id="togglePw" type="button">Show</button>
        </div>
    </div>

    <div class="field" id="confirmPasswordField" style="display:none;">
        <label class="field-label">Confirm Password</label>
        <div class="field-password">
            <input class="field-input" id="authPassConfirm" type="password" placeholder="Re-enter your password" autocomplete="new-password" />
            <button class="toggle-pw" id="togglePwConfirm" type="button">Show</button>
        </div>
    </div>

    <button class="submit-btn" id="authBtn">
        <span class="btn-text">Sign In</span>
        <div class="spinner"></div>
    </button>

    <div class="msg" id="authMsg"></div>

    <div class="bottom-text">
        Let's raise a glass to wellness
    </div>
</div>

<script>
    var API_BASE = window.location.hostname === "localhost"
        ? "http://localhost:8080"
        : "http://" + window.location.hostname + ":8080";

    var currentTab = "login";

    var existingToken = sessionStorage.getItem("authToken");
    if (existingToken && window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage("home");
    }

    function switchTab(tab) {
        currentTab = tab;
        var slider = document.getElementById("tabSlider");
        var loginBtn = document.getElementById("tabLogin");
        var registerBtn = document.getElementById("tabRegister");
        var submitBtn = document.getElementById("authBtn");
        var msg = document.getElementById("authMsg");
        var confirmField = document.getElementById("confirmPasswordField");
        var confirmInput = document.getElementById("authPassConfirm");
        var passInput = document.getElementById("authPass");
        var togglePw = document.getElementById("togglePw");
        var togglePwConfirm = document.getElementById("togglePwConfirm");

        if (tab === "register") {
            slider.classList.add("register");
            loginBtn.classList.remove("active");
            registerBtn.classList.add("active");
            submitBtn.querySelector(".btn-text").textContent = "Create Account";
            confirmField.style.display = "block";
            passInput.autocomplete = "new-password";
        } else {
            slider.classList.remove("register");
            loginBtn.classList.add("active");
            registerBtn.classList.remove("active");
            submitBtn.querySelector(".btn-text").textContent = "Sign In";
            confirmField.style.display = "none";
            passInput.autocomplete = "current-password";
        }

        msg.className = "msg";
        msg.style.display = "none";

        document.getElementById("authUser").value = "";
        document.getElementById("authPass").value = "";
        confirmInput.value = "";

        document.getElementById("authPass").type = "password";
        confirmInput.type = "password";
        togglePw.textContent = "Show";
        togglePwConfirm.textContent = "Show";
    }

    document.getElementById("authBtn").addEventListener("click", async function() {
        var username = document.getElementById("authUser").value.trim();
        var password = document.getElementById("authPass").value;
        var confirmPassword = document.getElementById("authPassConfirm").value;
        var msg = document.getElementById("authMsg");
        var btn = document.getElementById("authBtn");

        msg.className = "msg";
        msg.style.display = "none";

        if (!username || !password) {
            msg.className = "msg err";
            msg.style.display = "block";
            msg.textContent = "Please enter your username and password.";
            return;
        }

        if (currentTab === "register") {
            if (!confirmPassword) {
                msg.className = "msg err";
                msg.style.display = "block";
                msg.textContent = "Please confirm your password.";
                return;
            }

            if (password !== confirmPassword) {
                msg.className = "msg err";
                msg.style.display = "block";
                msg.textContent = "Passwords do not match.";
                return;
            }
        }

        btn.classList.add("loading");

        var endpoint = currentTab === "login" ? "/api/auth/login" : "/api/auth/register";

        try {
            var res = await fetch(API_BASE + endpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: username, password: password })
            });

            var text = await res.text();
            btn.classList.remove("loading");

            if (!res.ok) {
                msg.className = "msg err";
                msg.style.display = "block";
                msg.textContent = text || "Request failed (" + res.status + ")";
                return;
            }

            if (currentTab === "register") {
                msg.className = "msg ok";
                msg.style.display = "block";
                msg.textContent = text || "Account created! You can now sign in.";
                setTimeout(function() { switchTab("login"); }, 1500);
                return;
            }

            var data = JSON.parse(text);
            sessionStorage.setItem("authToken", data.token);
            sessionStorage.setItem("authUser", username);

            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage("home");
            }

        } catch (e) {
            btn.classList.remove("loading");
            msg.className = "msg err";
            msg.style.display = "block";
            msg.textContent = "Network error: " + (e.message || String(e));
        }
    });

    document.getElementById("authPass").addEventListener("keydown", function(e) {
        if (e.key === "Enter") document.getElementById("authBtn").click();
    });

    document.getElementById("authPassConfirm").addEventListener("keydown", function(e) {
        if (e.key === "Enter") document.getElementById("authBtn").click();
    });

    document.getElementById("authUser").addEventListener("keydown", function(e) {
        if (e.key === "Enter") document.getElementById("authBtn").click();
    });

    var togglePw = document.getElementById("togglePw");
    var togglePwConfirm = document.getElementById("togglePwConfirm");

    togglePw.addEventListener("click", function() {
        var passInput = document.getElementById("authPass");
        if (passInput.type === "password") {
            passInput.type = "text";
            togglePw.textContent = "Hide";
        } else {
            passInput.type = "password";
            togglePw.textContent = "Show";
        }
    });

    togglePwConfirm.addEventListener("click", function() {
        var confirmInput = document.getElementById("authPassConfirm");
        if (confirmInput.type === "password") {
            confirmInput.type = "text";
            togglePwConfirm.textContent = "Hide";
        } else {
            confirmInput.type = "password";
            togglePwConfirm.textContent = "Show";
        }
    });
</script>
</body>
</html>
