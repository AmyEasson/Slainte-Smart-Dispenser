<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Sláinte — Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --forest-deep: #0B1A0F;
    --forest-dark: #132A13;
    --forest-mid: #1E4D2B;
    --forest-green: #2D6A4F;
    --forest-pale: #52B788;
    --forest-mist: #B7E4C7;
    --cream: #F5F0E8;
    --cream-dark: #E8DFD0;
    --warm-white: #FEFCF8;
    --text-primary: #1A2E1A;
    --text-muted: #4A6B4A;
    --text-light: #7A9B7A;
    --danger: #C04030;
    --ok: #2D6A4F;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
      height: 100%;
      overflow: hidden;
      position: fixed;
      width: 100%;
  }

  body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--cream);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
  }

  /* ── Forest Scene ── */
  .forest-scene {
      position: relative;
      width: 100%;
      flex: 0 0 42%;
      overflow: hidden;
  }

  .forest-scene svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Floating fireflies */
  .firefly {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #E8C56D;
    box-shadow: 0 0 8px 3px rgba(232, 197, 109, 0.4);
    animation: float-firefly 6s ease-in-out infinite;
    opacity: 0;
  }

  .firefly:nth-child(1) { left: 15%; top: 30%; animation-delay: 0s; animation-duration: 7s; }
  .firefly:nth-child(2) { left: 70%; top: 20%; animation-delay: 2s; animation-duration: 5s; }
  .firefly:nth-child(3) { left: 45%; top: 45%; animation-delay: 4s; animation-duration: 8s; }
  .firefly:nth-child(4) { left: 80%; top: 35%; animation-delay: 1s; animation-duration: 6s; }
  .firefly:nth-child(5) { left: 25%; top: 50%; animation-delay: 3s; animation-duration: 9s; }
  .firefly:nth-child(6) { left: 55%; top: 15%; animation-delay: 5s; animation-duration: 7.5s; }

  @keyframes float-firefly {
    0%, 100% { opacity: 0; transform: translate(0, 0) scale(0.5); }
    15% { opacity: 0.9; }
    50% { opacity: 0.6; transform: translate(15px, -20px) scale(1); }
    85% { opacity: 0.8; }
  }

  /* Brand overlay on forest */
  .brand-overlay {
    position: absolute;
    bottom: 50px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 10;
    animation: fade-up 1s ease-out 0.3s both;
  }

  .brand-name {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: 48px;
    color: var(--warm-white);
    letter-spacing: -1px;
    text-shadow:
      0 2px 20px rgba(11, 26, 15, 0.5),
      0 0 60px rgba(45, 106, 79, 0.3);
    line-height: 1;
  }

  .brand-tagline {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 14px;
    color: var(--forest-mist);
    margin-top: 6px;
    letter-spacing: 2px;
    text-transform: lowercase;
    text-shadow: 0 1px 10px rgba(11, 26, 15, 0.4);
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Form Area ── */
  .form-area {
      flex: 1;
      background: var(--cream);
      padding: 24px 24px env(safe-area-inset-bottom, 20px);
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 5;
      overflow: hidden;
      animation: slide-up 0.8s ease-out 0.5s both;
  }

  .form-area::before {
    content: '';
    position: absolute;
    top: -24px;
    left: 0;
    right: 0;
    height: 26px;
    background: var(--cream);
    border-radius: 26px 26px 0 0;
    z-index: 4;
  }

  @keyframes slide-up {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Tab switcher */
  .tab-bar {
    display: flex;
    background: var(--cream-dark);
    border-radius: 16px;
    padding: 4px;
    margin-bottom: 24px;
    position: relative;
  }

  .tab-slider {
    position: absolute;
    top: 4px;
    left: 4px;
    width: calc(50% - 4px);
    height: calc(100% - 8px);
    background: var(--forest-mid);
    border-radius: 13px;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 2px 8px rgba(30, 77, 43, 0.3);
  }

  .tab-slider.register {
    transform: translateX(100%);
  }

  .tab-btn {
    flex: 1;
    padding: 12px;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    position: relative;
    z-index: 2;
    transition: color 0.3s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .tab-btn.active {
    color: var(--warm-white);
  }

  /* Input fields */
  .field {
    margin-bottom: 16px;
    animation: fade-up 0.5s ease-out both;
  }

  .field:nth-child(1) { animation-delay: 0.6s; }
  .field:nth-child(2) { animation-delay: 0.7s; }

  .field-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .field-input {
    width: 100%;
    padding: 16px 18px;
    border: 2px solid transparent;
    border-radius: 16px;
    background: var(--warm-white);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--text-primary);
    outline: none;
    transition: all 0.25s ease;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }

  .field-input::placeholder {
    color: var(--text-light);
  }

  .field-input:focus {
    border-color: var(--forest-pale);
    box-shadow:
      0 0 0 4px rgba(82, 183, 136, 0.15),
      0 2px 8px rgba(0,0,0,0.06);
  }

  /* Submit button */
  .submit-btn {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 18px;
    background: linear-gradient(135deg, var(--forest-mid), var(--forest-green));
    color: var(--warm-white);
    font-family: 'DM Sans', sans-serif;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: 0 4px 16px rgba(30, 77, 43, 0.35);
    -webkit-tap-highlight-color: transparent;
    animation: fade-up 0.5s ease-out 0.8s both;
  }

  .submit-btn:active {
    transform: translateY(1px) scale(0.98);
    box-shadow: 0 2px 8px rgba(30, 77, 43, 0.3);
  }

  .submit-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    border-radius: inherit;
  }

  /* Message */
  .msg {
    margin-top: 12px;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 500;
    display: none;
  }

  .msg.err {
    display: block;
    background: #FEF2F2;
    color: var(--danger);
    border: 1px solid #FECACA;
    animation: shake 0.4s ease;
  }

  .msg.ok {
    display: block;
    background: #F0FDF4;
    color: var(--ok);
    border: 1px solid #BBF7D0;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* Bottom text */
  .bottom-text {
    text-align: center;
    margin-top: auto;
    padding-top: 16px;
    font-size: 13px;
    color: var(--text-light);
    font-family: 'Fraunces', serif;
    font-style: italic;
    animation: fade-up 0.5s ease-out 1s both;
  }

  /* Loading state */
  .submit-btn.loading {
    pointer-events: none;
    opacity: 0.85;
  }

  .submit-btn.loading .btn-text {
    opacity: 0;
  }

  .spinner {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 22px;
    height: 22px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  .submit-btn.loading .spinner {
    display: block;
  }

  @keyframes spin {
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }
</style>
</head>
<body>

<!-- ── Vector Forest Scene ── -->

    <circle cx="310" cy="72" r="22" fill="none" stroke="#D8F3DC" stroke-width="0.5" opacity="0.4"/>

    <!-- Background hill -->
    <path d="M0 200 Q60 130 120 170 Q180 120 220 160 Q280 100 350 150 L393 130 L393 340 L0 340Z" fill="#0B1F12" opacity="0.6"/>

      <polygon points="100,255 120,90 140,255" fill="#0D2818"/>
      <polygon points="150,260 168,110 186,260" fill="#102415"/>

      <polygon points="245,260 262,105 279,260" fill="#102415"/>
      <polygon points="290,255 310,95 330,255" fill="#0D2818"/>
      <polygon points="340,260 358,115 376,260" fill="#102415"/>
    </g>

    <!-- Mid tree layer -->
    <g>
      <polygon points="20,290 50,160 80,290" fill="#132A13"/>
      <polygon points="28,260 50,180 72,260" fill="#163B20"/>
      <polygon points="35,235 50,195 65,235" fill="#1A4428"/>
      <rect x="46" y="290" width="8" height="20" fill="#3D2B1F" rx="2"/>

      <polygon points="90,280 125,140 160,280" fill="#132A13"/>
      <polygon points="98,250 125,160 152,250" fill="#163B20"/>
      <polygon points="105,225 125,178 145,225" fill="#1A4428"/>
      <rect x="121" y="280" width="9" height="22" fill="#3D2B1F" rx="2"/>

      <polygon points="175,295 210,110 245,295" fill="#132A13"/>
      <polygon points="183,260 210,130 237,260" fill="#163B20"/>
      <polygon points="190,230 210,155 230,230" fill="#1A4428"/>
      <rect x="205" y="295" width="10" height="25" fill="#3D2B1F" rx="2"/>

      <polygon points="260,290 290,155 320,290" fill="#132A13"/>
      <polygon points="268,260 290,175 312,260" fill="#163B20"/>
      <polygon points="274,235 290,190 306,235" fill="#1A4428"/>
      <rect x="286" y="290" width="8" height="20" fill="#3D2B1F" rx="2"/>

    <!-- Front tree layer -->
    <g>
      <rect x="52" y="280" width="14" height="60" fill="#5C3D2E" rx="4"/>

  <!-- Fireflies -->

  <div class="firefly"></div>
  <div class="firefly"></div>
  <div class="firefly"></div>
  <div class="firefly"></div>
  <div class="firefly"></div>

  </div>

<!-- ── Login Form ── -->
<div class="form-area">
  <!-- Tabs -->
  <div class="tab-bar">
    <div class="tab-slider" id="tabSlider"></div>
    <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
    <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">Register</button>
  </div>

  <!-- Fields -->
  <div class="field">
    <label class="field-label">Username</label>
    <input class="field-input" id="authUser" type="text" placeholder="Enter your username" autocomplete="username" />
  </div>

  <div class="field">
    <label class="field-label">Password</label>
    <input class="field-input" id="authPass" type="password" placeholder="Enter your password" autocomplete="current-password" />
  </div>

  <!-- Submit -->
  <button class="submit-btn" id="authBtn">
    <span class="btn-text">Sign In</span>
    <div class="spinner"></div>
  </button>

  <!-- Message -->
  <div class="msg" id="authMsg"></div>

  <!-- Bottom -->
  <div class="bottom-text">
      Let's raise a glass to wellness
  </div>
</div>

<script>
  var API_BASE = window.location.hostname === "localhost"
    ? "http://localhost:8080"
    : "http://" + window.location.hostname + ":8080";

  var currentTab = "login";

  // If already logged in, go straight to home
  var existingToken = sessionStorage.getItem("authToken");
  if (existingToken && window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage("home");
  }

  function switchTab(tab) {
    currentTab = tab;
    var slider = document.getElementById("tabSlider");
    var loginBtn = document.getElementById("tabLogin");
    var registerBtn = document.getElementById("tabRegister");
    var submitBtn = document.getElementById("authBtn");
    var msg = document.getElementById("authMsg");

    if (tab === "register") {
      slider.classList.add("register");
      loginBtn.classList.remove("active");
      registerBtn.classList.add("active");
      submitBtn.querySelector(".btn-text").textContent = "Create Account";
    } else {
      slider.classList.remove("register");
      loginBtn.classList.add("active");
      registerBtn.classList.remove("active");
      submitBtn.querySelector(".btn-text").textContent = "Sign In";
    }

    msg.className = "msg";
    msg.style.display = "none";
    document.getElementById("authUser").value = "";
    document.getElementById("authPass").value = "";
  }

  document.getElementById("authBtn").addEventListener("click", async function() {
    var username = document.getElementById("authUser").value.trim();
    var password = document.getElementById("authPass").value;
    var msg = document.getElementById("authMsg");
    var btn = document.getElementById("authBtn");

    msg.className = "msg";
    msg.style.display = "none";

    if (!username || !password) {
      msg.className = "msg err";
      msg.style.display = "block";
      msg.textContent = "Please enter your username and password.";
      return;
    }

    btn.classList.add("loading");

    var endpoint = currentTab === "login" ? "/api/auth/login" : "/api/auth/register";

    try {
      var res = await fetch(API_BASE + endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: username, password: password })
      });

      var text = await res.text();
      btn.classList.remove("loading");

      if (!res.ok) {
        msg.className = "msg err";
        msg.style.display = "block";
        msg.textContent = text || "Request failed (" + res.status + ")";
        return;
      }

      if (currentTab === "register") {
        msg.className = "msg ok";
        msg.style.display = "block";
        msg.textContent = text || "Account created! You can now sign in.";
        setTimeout(function() { switchTab("login"); }, 1500);
        return;
      }

      // Login success — store token and navigate to home
      var data = JSON.parse(text);
      sessionStorage.setItem("authToken", data.token);
      sessionStorage.setItem("authUser", username);

      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage("home");
      }

    } catch (e) {
      btn.classList.remove("loading");
      msg.className = "msg err";
      msg.style.display = "block";
      msg.textContent = "Network error: " + (e.message || String(e));
    }
  });

  document.getElementById("authPass").addEventListener("keydown", function(e) {
    if (e.key === "Enter") document.getElementById("authBtn").click();
  });
</script>
</body>
</html>
