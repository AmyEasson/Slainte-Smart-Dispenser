<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Sláinte — Vitamins</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@400;500;600;700&display=swap');
:root{--bg:#F5F0E8;--panel:#FEFCF8;--text:#1A2E1A;--muted:#4A6B4A;--border:#D4C5A9;--ok:#2D6A4F;--cream-dark:#E8DFD0;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{height:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px;}
.wrap{ max-width: 720px; margin: 0 auto; padding: calc(env(safe-area-inset-top, 20px) + 69px) 16px 16px; }
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;animation:fade-up .5s ease-out .1s both;}.topbar h1{font-size:20px;margin:0;font-weight:900;font-family:'Fraunces',serif;}
.back {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--cream-dark);
    border: none;
    text-decoration: none;
    transition: all 0.25s ease;
}

.back:active { transform: scale(0.9); background: var(--border); }
.hero{animation:fade-up .5s ease-out .15s both;margin-bottom:4px;}.hero-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}.hero-number{font-family:'Fraunces',serif;font-weight:900;font-size:52px;line-height:1;color:var(--text);}.hero-unit{font-family:'Fraunces',serif;font-weight:400;font-size:22px;color:var(--muted);}
.chart-card{background:var(--panel);border:1px solid rgba(30,77,43,.08);border-radius:22px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.03);margin-top:20px;animation:fade-up .5s ease-out .25s both;}.chart-card canvas{width:100%!important;}
.vit-list{margin-top:20px;animation:fade-up .5s ease-out .35s both;display:flex;flex-direction:column;gap:10px;}
.vit-item{background:var(--panel);border:1px solid rgba(30,77,43,.08);border-radius:18px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.03);}
.vit-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.vit-name{flex:1;font-family:'Fraunces',serif;font-weight:700;font-size:15px;}
.vit-count{font-size:14px;color:var(--muted);font-weight:600;}
.vit-pct{font-family:'Fraunces',serif;font-weight:900;font-size:16px;color:var(--ok);min-width:50px;text-align:right;}
.section-title{font-family:'Fraunces',serif;font-weight:700;font-size:18px;color:var(--text);margin:28px 0 12px;animation:fade-up .5s ease-out .4s both;}
.info-card{background:var(--panel);border:1px solid rgba(30,77,43,.08);border-radius:22px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.03);animation:fade-up .5s ease-out .45s both;}.info-text{font-size:14px;color:var(--text);line-height:1.6;}
@keyframes fade-up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">
<div class="topbar"><a class="back" href="dashboard.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1A2E1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></a><h1>By Vitamin Type</h1><div style="min-width:36px;"></div></div>
<div class="hero"><div class="hero-label">Types tracked</div><div><span class="hero-number" id="hCount">6</span><span class="hero-unit"> vitamins</span></div></div>
<div class="chart-card"><canvas id="donutChart" height="280"></canvas></div>
<div class="vit-list" id="vitList"></div>
<div class="section-title">About Vitamin Tracking</div>
<div class="info-card"><div class="info-text">This breakdown shows how your intake is distributed across different supplement types. A balanced distribution means you're consistently taking all your scheduled vitamins rather than favoring some over others.</div></div>
</div>
<script>
Chart.defaults.font.family="'DM Sans',system-ui,sans-serif";Chart.defaults.font.size=11;Chart.defaults.color="#4A6B4A";Chart.defaults.plugins.legend.display=false;
var FOREST=["#1E4D2B","#2D6A4F","#40916C","#52B788","#74C69D","#95D5B2","#B7E4C7","#D8F3DC"];
var DATA=JSON.parse(sessionStorage.getItem("dashboardData")||"{}");
var vits=DATA.byVitaminType||[];
document.getElementById("hCount").textContent=vits.length;

new Chart(document.getElementById("donutChart"),{type:"doughnut",data:{labels:vits.map(function(v){return v.vitaminType;}),datasets:[{data:vits.map(function(v){return v.count;}),backgroundColor:vits.map(function(_,i){return FOREST[i%FOREST.length];}),borderWidth:3,borderColor:"#FEFCF8"}]},options:{responsive:true,maintainAspectRatio:false,cutout:"45%",plugins:{legend:{display:true,position:"bottom",labels:{padding:14,usePointStyle:true,pointStyle:"circle",font:{size:12}}},tooltip:{backgroundColor:"#1A2E1A",cornerRadius:12,padding:10,callbacks:{label:function(c){var d=vits[c.dataIndex];return d.vitaminType+": "+d.pct+"%";}}}},animation:{animateRotate:true,duration:800}}});

var listHtml='';
vits.forEach(function(v,i){
listHtml+='<div class="vit-item"><div class="vit-dot" style="background:'+FOREST[i%FOREST.length]+'"></div><div class="vit-name">'+v.vitaminType+'</div><div class="vit-count">'+v.count+' doses</div><div class="vit-pct">'+v.pct+'%</div></div>';
});
document.getElementById("vitList").innerHTML=listHtml;
</script>
</body>
</html>
