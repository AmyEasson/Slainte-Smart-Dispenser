<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Refill Instructions</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@400;500;600;700&display=swap');

        :root {
            --bg: #F5F0E8;
            --panel: #FEFCF8;
            --text: #1A2E1A;
            --muted: #4A6B4A;
            --border: #D4C5A9;
            --primary: #1E4D2B;
            --danger: #C04030;
            --ok: #2D6A4F;
            --err: #C04030;
            --warn-text: #92400e;
            --cream-dark: #E8DFD0;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', system-ui, sans-serif;
        }

        .wrap {
            max-width: 720px;
            margin: 0 auto;
            padding: calc(env(safe-area-inset-top, 20px) + 69px) 16px 16px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
            animation: fade-up .5s ease-out .1s both;
        }

        .topbar h1 {
            font-size: 20px;
            margin: 0;
            font-weight: 900;
            font-family: 'Fraunces', serif;
        }

        .back {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--cream-dark);
            border: none;
            text-decoration: none;
            transition: all 0.25s ease;
            cursor: pointer;
        }
        .back:active { transform: scale(0.9); background: var(--border); }

        .card {
            background: var(--panel);
            border: 1px solid rgba(30,77,43,0.08);
            border-radius: 22px;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            margin-top: 12px;
            animation: fade-up 0.5s ease-out 0.2s both;
        }

        .card-title {
            font-weight: 900;
            font-size: 15px;
            font-family: 'Fraunces', serif;
            margin-bottom: 8px;
        }

        .muted { color: var(--muted); font-size: 14px; }
        .ok { color: var(--ok); font-size: 14px; }
        .err { color: var(--err); font-size: 14px; }
        .warn { color: var(--warn-text); font-size: 14px; }

        .btnRow {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 12px;
        }

        button {
            border-radius: 16px;
            border: 2px solid transparent;
            padding: 12px 16px;
            font-size: 15px;
            background: var(--panel);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            transition: all 0.25s ease;
            cursor: pointer;
            border: 1px solid var(--border);
            -webkit-tap-highlight-color: transparent;
        }

        .primary {
            background: linear-gradient(135deg, #1E4D2B, #2D6A4F);
            color: #FEFCF8;
            border-color: transparent;
            box-shadow: 0 4px 16px rgba(30,77,43,0.35);
        }

        .primary:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(30,77,43,0.25); }
        button:active { transform: scale(0.95); }

        #status {
            margin-top: 10px;
            font-size: 14px;
        }

        /* Slot grid */
        .slot-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 4px;
        }

        .slot {
            border: 1px solid rgba(30,77,43,0.08);
            border-radius: 18px;
            padding: 14px;
            background: #EDE8DD;
            animation: fade-up 0.4s ease-out both;
        }

        .slot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .slot-number {
            font-weight: 900;
            font-size: 15px;
            font-family: 'Fraunces', serif;
        }

        .slot-tag {
            font-size: 12px;
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 4px 10px;
            background: var(--panel);
            font-weight: 600;
        }

        .slot-when {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .vit-list {
            margin: 6px 0 0 0;
            padding-left: 18px;
        }

        .vit-list li {
            font-size: 14px;
            color: var(--text);
            padding: 2px 0;
        }

        .refill-meta {
            font-size: 14px;
            line-height: 1.8;
            color: var(--text);
        }

        .refill-meta strong {
            color: var(--primary);
        }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="topbar">
        <a class="back" href="home.html">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1A2E1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </a>
        <h1>Refill Instructions</h1>
        <div style="min-width: 36px;"></div>
    </div>

    <!-- Refill status card -->
    <div class="card">
        <div class="card-title">Refill Status</div>
        <div id="refillBanner" class="muted">Loading refill info...</div>
        <div id="status"></div>
        <div class="btnRow">
            <button class="primary" id="confirmFillBtn">I've filled the dispenser</button>
            <button id="refreshBtn">Refresh</button>
        </div>
    </div>

    <!-- Slot guide card -->
    <div class="card">
        <div class="card-title">Slot Guide</div>
        <div id="slotGuide" class="slot-grid">
            <div class="muted">Loading slots...</div>
        </div>
    </div>
</div>

<script>
    const API_BASE = window.location.hostname === "localhost"
        ? "http://localhost:8080"
        : "http://" + window.location.hostname + ":8080";

    const authToken = sessionStorage.getItem("authToken");
    if (!authToken) {
        window.ReactNativeWebView && window.ReactNativeWebView.postMessage("login");
        throw new Error("Not authenticated");
    }

    function authHeaders(extra = {}) {
        return { ...extra, "Authorization": "Bearer " + authToken };
    }

    function escapeHtml(str) {
        return String(str ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
    }

    function formatDate(dateStr) {
        if (!dateStr) return "—";
        const d = new Date(dateStr + "T00:00:00");
        return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    }

    function renderRefillInfo(info) {
        const el = document.getElementById("refillBanner");

        if (info.warning === "SCHEDULE_CHANGED") {
            el.className = "warn";
            el.textContent = "Your schedule changed — your new refill date is " + formatDate(info.refillDate) + ".";
            return;
        }
        if (info.warning === "SCHEDULE_TOO_LARGE") {
            el.className = "err";
            el.textContent = "Your schedule requires more slots than the dispenser has. Please simplify your schedule.";
            return;
        }
        if (info.warning === "NO_SCHEDULE") {
            el.className = "warn";
            el.textContent = "No schedule found. Create a schedule first.";
            return;
        }

        el.className = "refill-meta";
        el.innerHTML =
            "Last fill date: <strong>" + escapeHtml(formatDate(info.lastFillDate)) + "</strong><br>" +
            "Next refill date: <strong>" + escapeHtml(formatDate(info.refillDate)) + "</strong><br>" +
            "Days until refill: <strong>" + escapeHtml(info.daysUntilRefill) + "</strong>";
    }

    function renderSlots(slots) {
        const root = document.getElementById("slotGuide");
        root.innerHTML = "";

        if (!Array.isArray(slots) || slots.length === 0) {
            root.innerHTML = '<div class="muted">No slot information available.</div>';
            return;
        }

        slots.forEach((slot, i) => {
            const card = document.createElement("div");
            card.className = "slot";
            card.style.animationDelay = (i * 0.05) + "s";

            let bodyHtml = "";

            if (slot.reserved) {
                bodyHtml = `<div class="muted" style="font-size:13px;">Leave empty (dispense opening)</div>`;
            } else if (!slot.vitamins || slot.vitamins.length === 0) {
                bodyHtml = `<div class="muted" style="font-size:13px;">Unused slot</div>`;
            } else {
                const when = `${escapeHtml(slot.assignedDay || "")} ${escapeHtml(slot.assignedTime || "")}`.trim();
                bodyHtml = `
                    <div class="slot-when">${when || "Assigned slot"}</div>
                    <ul class="vit-list">
                        ${slot.vitamins.map(v => `<li>${escapeHtml(v.vitaminType)} × ${escapeHtml(v.numberOfPills)}</li>`).join("")}
                    </ul>
                `;
            }

            card.innerHTML = `
                <div class="slot-header">
                    <div class="slot-number">Slot ${escapeHtml(slot.slotNumber)}</div>
                    ${slot.reserved ? `<div class="slot-tag">Reserved</div>` : ""}
                </div>
                ${bodyHtml}
            `;

            root.appendChild(card);
        });
    }

    async function loadRefillInfo() {
        const res = await fetch(API_BASE + "/api/mobile/slots/refill-info", { headers: authHeaders() });
        if (!res.ok) throw new Error("Failed to load refill info (" + res.status + ")");
        return await res.json();
    }

    async function loadSlots() {
        const res = await fetch(API_BASE + "/api/mobile/slots", { headers: authHeaders() });
        if (!res.ok) throw new Error("Failed to load slots (" + res.status + ")");
        return await res.json();
    }

    async function confirmFill() {
        const res = await fetch(API_BASE + "/api/mobile/slots/confirm-fill", {
            method: "POST",
            headers: authHeaders()
        });
        if (!res.ok) {
            const text = await res.text();
            throw new Error(text || ("Confirm fill failed (" + res.status + ")"));
        }
        return await res.json();
    }

    async function loadPage() {
        const status = document.getElementById("status");
        status.className = "muted";
        status.textContent = "";

        try {
            const [refillInfo, slotRes] = await Promise.all([loadRefillInfo(), loadSlots()]);
            renderRefillInfo(refillInfo);
            renderSlots(slotRes.slots || []);
        } catch (e) {
            document.getElementById("refillBanner").className = "err";
            document.getElementById("refillBanner").textContent = e.message || String(e);
            document.getElementById("slotGuide").innerHTML = '<div class="err">Could not load slot guide.</div>';
        }
    }

    document.getElementById("refreshBtn").addEventListener("click", loadPage);

    document.getElementById("confirmFillBtn").addEventListener("click", async () => {
        const status = document.getElementById("status");
        status.className = "muted";
        status.textContent = "Confirming refill...";
        try {
            const updated = await confirmFill();
            status.className = "ok";
            status.textContent = "Refill confirmed. Next refill date: " + formatDate(updated.refillDate);
            await loadPage();
        } catch (e) {
            status.className = "err";
            status.textContent = e.message || String(e);
        }
    });

    loadPage();
</script>
</body>
</html>
