<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <style>
        :root{
            --bg:#f8fafc;
            --panel:#ffffff;
            --text:#111827;
            --muted:#6b7280;
            --border:#e5e7eb;
            --primary:#2563eb;
            --danger:#b42318;
            --ok:#047857;
        }

        *{ box-sizing:border-box; }
        body{
            margin:0;
            background:var(--bg);
            color:var(--text);
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
            padding: 16px;
            max-width: 520px;
            margin: 0 auto;
        }

        h2{ margin: 0 0 8px; font-size: 18px; font-weight: 900; }

        .muted{ color: var(--muted); font-size: 13px; line-height: 1.4; margin-bottom: 16px; }
        .err{ color: var(--danger); font-size: 13px; margin-top: 6px; }
        .ok{ color: var(--ok); font-size: 13px; margin-top: 6px; }

        .card{
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 14px;
            margin: 12px 0;
            box-shadow: 0 1px 0 rgba(0,0,0,0.02);
        }

        label{ display: block; font-size: 12px; color: #4b5563; margin-bottom: 4px; }

        input{
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 16px;
            margin-bottom: 10px;
            background: #fff;
            color: var(--text);
        }

        button{
            display: inline-block;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: #fff;
            cursor: pointer;
            font-size: 14px;
            color: var(--text);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        button#authBtn{
            width: 100%;
            border-radius: 14px;
            padding: 12px;
            font-size: 16px;
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .tabs{ display: flex; gap: 8px; margin-bottom: 14px; }
        .tab{
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: #fff;
            cursor: pointer;
            font-size: 13px;
            color: var(--text);
        }
        .tab.active{ background: var(--text); color: #fff; border-color: var(--text); }
    </style>
</head>
<body>

<h2>Mobile App (Mock)</h2>
<div class="muted">Sign in or register to continue.</div>

<div class="card">
    <div class="tabs">
        <button class="tab active" id="tabLogin" onclick="switchTab('login')">Sign in</button>
        <button class="tab" id="tabRegister" onclick="switchTab('register')">Register</button>
    </div>

    <label>Username</label>
    <input id="authUser" placeholder="username" autocomplete="username" />
    <label>Password</label>
    <input id="authPass" type="password" placeholder="password" autocomplete="current-password" />

    <button id="authBtn">Sign in</button>
    <div id="authMsg" style="display:none;"></div>
</div>

<script>
    const API_BASE = window.location.hostname === "localhost"
        ? "http://localhost:8080"
        : "http://" + window.location.hostname + ":8080";

    let currentTab = "login";

    // If already logged in, go straight to home
    const existingToken = sessionStorage.getItem("authToken");
    if (existingToken) {
        window.ReactNativeWebView.postMessage("home");
    }

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById("tabLogin").classList.toggle("active", tab === "login");
        document.getElementById("tabRegister").classList.toggle("active", tab === "register");
        document.getElementById("authBtn").textContent = tab === "login" ? "Sign in" : "Register";
        document.getElementById("authMsg").style.display = "none";
        document.getElementById("authUser").value = "";
        document.getElementById("authPass").value = "";
    }

    document.getElementById("authBtn").addEventListener("click", async () => {
        const username = document.getElementById("authUser").value.trim();
        const password = document.getElementById("authPass").value;
        const msg = document.getElementById("authMsg");

        msg.style.display = "none";

        if (!username || !password) {
            msg.className = "err";
            msg.style.display = "block";
            msg.textContent = "Please enter your username and password.";
            return;
        }

        const endpoint = currentTab === "login" ? "/api/auth/login" : "/api/auth/register";

        try {
            const res = await fetch(API_BASE + endpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            const text = await res.text();

            if (!res.ok) {
                msg.className = "err";
                msg.style.display = "block";
                msg.textContent = text || "Request failed (" + res.status + ")";
                return;
            }

            if (currentTab === "register") {
                msg.className = "ok";
                msg.style.display = "block";
                msg.textContent = text || "Registered successfully. You can now sign in.";
                switchTab("login");
                return;
            }

            // Login — parse token and navigate to home
            const data = JSON.parse(text);
            sessionStorage.setItem("authToken", data.token);
            sessionStorage.setItem("authUser", username);
            window.ReactNativeWebView.postMessage("home");

        } catch (e) {
            msg.className = "err";
            msg.style.display = "block";
            msg.textContent = "Network error: " + (e?.message || String(e));
        }
    });

    document.getElementById("authPass").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("authBtn").click();
    });
</script>
</body>
</html>
