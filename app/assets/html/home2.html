<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home</title>
    <style>
        :root{
            --bg:#f8fafc;
            --panel:#ffffff;
            --text:#111827;
            --muted:#6b7280;
            --border:#e5e7eb;
        }

        *{ box-sizing:border-box; }
        body{
            margin:0;
            background:var(--bg);
            color:var(--text);
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
            padding: 16px;
            max-width: 520px;
            margin: 0 auto;
        }

        h2{ margin: 0 0 8px; font-size: 18px; font-weight: 900; }

        .muted{ color: var(--muted); font-size: 13px; line-height: 1.4; margin-bottom: 16px; }

        .card{
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 14px;
            margin: 12px 0;
            box-shadow: 0 1px 0 rgba(0,0,0,0.02);
        }

        .title{ font-weight: 900; font-size: 15px; margin-bottom: 4px; }
        .desc{ color: var(--muted); font-size: 13px; margin-bottom: 10px; }

        button, a.btn{
            display: inline-block;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: #fff;
            cursor: pointer;
            font-size: 14px;
            color: var(--text);
            text-decoration: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .signout{
            float: right;
            font-size: 12px;
            color: var(--muted);
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<h2>Mobile App (Mock) <button class="signout" id="logoutBtn">Sign out</button></h2>
<div class="muted" id="welcomeMsg"></div>

<div class="card">
    <div class="title">Intake Log</div>
    <div class="desc">View mocked intake logs and statuses (TAKEN / PENDING / MISSED).</div>
    <a class="btn" href="intake.html">Open Intake</a>
</div>

<div class="card">
    <div class="title">Scheduling Tool</div>
    <div class="desc">Create a weekly schedule payload and generate the JSON to send to backend.</div>
    <a class="btn" href="schedule.html">Open Schedule</a>
</div>

<script>
    // If not logged in, redirect to login
    const authToken = sessionStorage.getItem("authToken");
    const authUser = sessionStorage.getItem("authUser");

    if (!authToken) {
        window.ReactNativeWebView.postMessage("login");
    } else {
        document.getElementById("welcomeMsg").textContent =
            "Simple navigation for the mocked UI prototypes. Signed in as " + authUser + ".";
    }

    document.getElementById("logoutBtn").addEventListener("click", () => {
        sessionStorage.removeItem("authToken");
        sessionStorage.removeItem("authUser");
        window.ReactNativeWebView.postMessage("login");
    });
</script>
</body>
</html>
